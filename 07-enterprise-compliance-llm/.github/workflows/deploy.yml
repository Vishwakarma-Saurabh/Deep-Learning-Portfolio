name: Deploy Compliance AI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Run evaluation harness
        run: |
          python llmops/eval_harness.py
      
      - name: Run security checks
        run: |
          python security/input_guard.py
          python security/output_filter.py

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v3
      
      - name: Build Docker image
        run: |
          docker build -f deployment/Dockerfile.api -t compliance-api:latest .
      
      - name: Push to registry
        run: |
          echo "${{ secrets.DOCKER_TOKEN }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          docker tag compliance-api:latest ${{ secrets.DOCKER_USERNAME }}/compliance-api:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/compliance-api:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to server
        run: |
          echo "Deploying to production server..."
          # Add your deployment commands here
          # Example: SSH into server and pull new images